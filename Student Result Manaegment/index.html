<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Management</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h2>Student Result Management</h2>

    <label>Student Name</label>
    <input type="text" id="studentName">

    <label>Roll No</label>
    <input type="number" id="rollNo">

    <label>English</label>
    <input type="number" id="english">

    <label>Science</label>
    <input type="number" id="science">

    <label>Maths</label>
    <input type="number" id="maths">

    <button onclick="addStudent()">Add Student</button>

</div>

<table id="studentTable">

<thead>

<tr>
    <th>Name</th>
    <th>Roll No</th>
    <th>English</th>
    <th>Science</th>
    <th>Maths</th>
    <th>Total</th>
    <th>Percentage</th>
    <th>Grade</th>
    <th>Status</th>
    <th>Edit</th>
    <th>Delete</th>
</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

<script src="script.js"></script>

</body>
</html>
