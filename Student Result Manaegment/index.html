<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
    <h2> Student Result Management System</h2>
    </div>

    <div class="container mt-4">
    <div class="card shadow">
    <div class="card-body">

    <h3 class="text-primary">
    <i class="bi bi-person-fill"></i>
     Add / Edit Student Record
    </h3>

    <div class="row mt-4">
    <div class="col-md-3">

        <label class="form-label">Student Name</label>
        <input type="text" id="studentName"class="form-control" placeholder="Enter student name">
        </div>

                <div class="col-md-2">
                <label class="form-label">Roll No</label>
                <input type="number" id="rollNo" class="form-control" placeholder="Roll No">
                </div>

                <div class="col-md-2">
                <label class="form-label">English</label>
                <input type="number" id="english" class="form-control" placeholder="Marks">
                </div>

                <div class="col-md-2">
                    <label class="form-label">Science</label>
                    <input type="number" id="science"class="form-control"placeholder="Marks">
                </div>

                <div class="col-md-2">
                    <label class="form-label">Maths</label>
                    <input type="number"id="maths" class="form-control"placeholder="Marks"></div>
                </div>

                <div class="text-end mt-4">
                <button
                class="btn btn-success me-2" onclick="addStudent()">Save</button>
                <i class="bi bi-floppy-fill"></i>
                </button>

                <button
                class="btn btn-danger" onclick="clearForm()"> Clear</button>
                <i class="bi bi-x-circle-fill"></i>
                </button>
            </div>
        </div>
    </div>
    <div class="card shadow mt-4">
        <div class="card-body">
            <h3 class="text-primary">
            <i class="bi bi-search"></i>
            Search Student
            </h3>

            <div class="input-group mt-3">
            <input type="text" id="search" class="form-control" placeholder="Search by Student Name">

            <button class="btn btn-primary">
            <i class="bi bi-search"></i>
            Search
            </button>

            </div>

        </div>

    </div>
    <div class="card shadow mt-4">

        <div class="card-body">

            <h3 class="text-primary">

                <i class="bi bi-table"></i>

                Student Records

            </h3>

            <div class="table-responsive mt-3">

                <table class="table table-bordered table-hover text-center">

                    <thead>

                    <tr>

                        <th>Name</th>

                        <th>Roll No</th>

                        <th>English</th>

                        <th>Science</th>

                        <th>Maths</th>

                        <th>Total</th>

                        <th>Percentage</th>

                        <th>Grade</th>

                        <th>Status</th>

                        <th>Edit</th>

                        <th>Delete</th>

                    </tr>

                    </thead>

                    <tbody id="tableBody">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
